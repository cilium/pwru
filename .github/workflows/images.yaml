name: Image Release Build

on:
  pull_request: {}
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.after }}
  cancel-in-progress: true

jobs:
  build-and-push-prs:
    if: ${{ github.repository == 'cilium/pwru' }}
    environment: ${{ github.ref_type == 'tag' && 'release' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: ${{ github.ref_type == 'tag' }}
        with:
          username: ${{ secrets.DOCKER_HUB_RELEASE_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_RELEASE_PASSWORD }}

      - name: Getting image tag
        id: tag
        run: |
          if [ ${{ github.event.pull_request.head.sha }} != "" ]; then
            tag=${{ github.event.pull_request.head.sha }}
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            tag=${{ github.ref_name }}
          else
            tag=${{ github.sha }}
          fi
          echo tag=$tag >> $GITHUB_OUTPUT
          image_tags=${{ github.repository_owner }}/pwru:$tag
          if [ "${{ github.ref_type }}" == "tag" ]; then
            image_tags="$image_tags,${{ github.repository_owner }}/pwru:latest"
          fi
          echo image_tags=$image_tags >> $GITHUB_OUTPUT

      - name: Checkout Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Docker Build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64,linux/amd64
          push: ${{ github.ref_type == 'tag' }}
          tags: ${{ steps.tag.outputs.image_tags }}
